# =============================================
# Configuraciˇn General
# =============================================
spring.application.name=empresa-auth-service

# =============================================
# Base de Datos H2
# =============================================
spring.datasource.url=jdbc:h2:mem:empresa_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Cache (necesario para @Cacheable)
spring.cache.type=caffeine

# =============================================
# JWT Configuration
# =============================================
jwt.secret=MiClaveSecretaMuyLargaParaJWT_1234567890SuperSeguraParaDesarrollo2026
jwt.expiration=28800000

# =============================================
# Logging
# =============================================
logging.level.com.practica.empresa=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG